# https://taskfile.dev

version: "3"

env:
  GO111MODULE: on
  GOPROXY: https://proxy.golang.org,direct

tasks:
  default:
    cmds:
      - task: update
      - task: sync
  update:
    desc: update goreleaser-pro
    cmds:
      - go get github.com/goreleaser/goreleaser-pro/v2@latest
      - go mod tidy
  sync:
    desc: Sync docs
    sources:
      - ../goreleaser/www/docs/
    generates:
      - ./pkg/config/
    cmds:
      - rm -rf docs
      - mkdir -p docs
      - sh -c 'cd ../goreleaser/www; hugo'
      - rsync -a --include='*/' --exclude='index.md' --include='*.md' --exclude='*' --prune-empty-dirs ../goreleaser/www/public/customization/ ./docs/
      - cp ../goreleaser/www/public/resources/deprecations.md ./docs/
  release:
    desc: Create a new tag
    vars:
      NEXT:
        sh: svu n --always
    prompt: "This will release {{.NEXT}}. Continue?"
    preconditions:
      - sh: '[ $(git symbolic-ref --short HEAD) = "main" ]'
        msg: Not on main branch
      - sh: "[ $(git status --porcelain=2 | wc -l) = 0 ]"
        msg: "Git is dirty"
    cmds:
      - "git tag -d nightly || true"
      - git tag {{.NEXT}}
      - echo {{.NEXT}}
      - git push origin --tags
